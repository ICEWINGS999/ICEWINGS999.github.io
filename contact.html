<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>RAP CAMPUS-CONTACT</title>
	<link rel="stylesheet" type="text/css" href="index.html">

	<style>
		body{
			background: #050505;
			color: white;
			font-family: Arial,sans-serif;
			text-align: center;
		}
		nav{
			background: #111;
			padding: 20px;
			border-bottom: 2px solid red;
		}
		nav a{
			color: white;
			text-decoration: none;
			margin: 15px;
		}
		h1{
			color: red;
			text-shadow: 0 0 15px red;
		}
		form{
			width: 80%;
			max-width: 500px;
			margin: auto;
		}
		input,textarea{
			width: 100%;
			padding: 12px;
			margin: 10px 0;
			background: #111;
			border: 1px solid red;
			color: white;
		}
		button{
			background: red;
			border: none;
			padding: 12px 25px;
			color: white;
			cursor: pointer;
		}
	</style>
</head>
<body>
	<nav>
		<a href="index.html">Home</a>
		<a href="contact.html">Contact</a>
	</nav>
    <h1>CONTACT RAP CAMPUS</h1>
    <form id="contactForm">
    	<input type="text" id="name" placeholder="Your Name">
    	<input type="email" id="email" placeholder="Your email">
    	<textarea id="message" rows="6" placeholder="Your message"></textarea>
    	<button type="submit">Send Message</button>
    </form>
    <script>
         document.getElementById('contactForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const message = document.getElementById('message').value;

    const phone = '2349027473986';

    const text = encodeURIComponent(
        `🎤 New message from Rap Campus:\n\nName: ${name}\nEmail: ${email}\nMessage: ${message}`
    );

    window.open(`https://wa.me/${phone}?text=${text}`, '_blank');
});
    </script>

</body>
</html>
